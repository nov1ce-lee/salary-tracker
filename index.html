<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>薪资引擎 · Salary Engine</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231a1a1a'/><text x='16' y='23' text-anchor='middle' font-size='20'>⚡</text></svg>">
<style>
  :root {
    --bg: #f8f5f0;
    --card: #ffffff;
    --ink: #1a1a1a;
    --ink-dim: #6b6b6b;
    --accent: #e8603a;
    --accent2: #2d85c7;
    --accent3: #3a9d5e;
    --border: #e8e3dd;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 6px 20px rgba(0,0,0,0.05);
    --radius: 16px;
    --font-number: 'Avenir Next', 'Helvetica Neue', 'Segoe UI', Arial, sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── 纹理背景 ── */
  body::before {
    content: ''; position:fixed; inset:0; z-index:0; pointer-events:none;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='0.5' cy='0.5' r='0.5' fill='%23d8d3cc' opacity='0.5'/%3E%3C/svg%3E") repeat;
    background-size: 60px 60px;
  }

  .app {
    position:relative; z-index:1; width:100%; max-width:1200px; margin:0 auto; padding:36px 28px 64px;
  }

  /* ── 顶部 ── */
  .topbar {
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px;
    margin-bottom:28px;
  }
  .brand { font-size:13px; font-weight:600; letter-spacing:3px; color:var(--ink-dim); text-transform:uppercase; }
  .timestamp { font-size:12px; color:var(--ink-dim); font-family:var(--font-number); }

  /* ── 仪表盘主卡片 ── */
  .dashboard {
    display:grid; grid-template-columns:1fr; gap:32px;
  }

  .hero-card {
    background:var(--card); border-radius:24px; padding:34px 36px 30px;
    box-shadow:var(--shadow); border:1px solid var(--border);
    display:flex; flex-wrap:wrap; align-items:flex-end; justify-content:space-between;
    gap:26px; margin-bottom:4px;
  }
  .hero-left { flex:1; min-width:240px; }
  .hero-title {
    font-size:clamp(22px,3.5vw,36px); font-weight:700; letter-spacing:-0.5px;
    line-height:1.15; margin-bottom:6px;
  }
  .hero-sub {
    font-size:13px; color:var(--ink-dim); line-height:1.6; max-width:480px;
  }
  .hero-kpi {
    display:flex; flex-direction:column; align-items:flex-end; gap:4px;
    padding:20px 24px; border-radius:20px;
    background:var(--bg); min-width:140px;
  }
  .hero-kpi-label { font-size:11px; color:var(--ink-dim); letter-spacing:1px; text-transform:uppercase; }
  .hero-kpi-value { font-size:48px; font-weight:700; color:var(--accent); line-height:1; font-family:var(--font-number); letter-spacing:-1px; }

  /* ── 指标磁贴 ── */
  .tiles {
    display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:20px;
  }
  .tile {
    background:var(--card); border-radius:20px; padding:24px 22px;
    box-shadow:var(--shadow); border:1px solid var(--border);
    display:flex; flex-direction:column; gap:8px;
  }
  .tile-label { font-size:11px; color:var(--ink-dim); letter-spacing:0.5px; }
  .tile-value {
    font-size:clamp(20px,3.5vw,30px); font-weight:700; line-height:1;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    font-family:var(--font-number); letter-spacing:-0.5px;
  }
  .tile-value.accent  { color:var(--accent); }
  .tile-value.accent2 { color:var(--accent2); }
  .tile-value.accent3 { color:var(--accent3); }
  .tile-hint { font-size:11px; color:var(--ink-dim); opacity:0.7; }

  /* ── 进度条 ── */
  .progress-row {
    display:grid; grid-template-columns:1fr; gap:18px;
  }
  .prog-card {
    background:var(--card); border-radius:20px; padding:22px 24px;
    box-shadow:var(--shadow); border:1px solid var(--border);
  }
  .prog-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .prog-title { font-size:15px; font-weight:600; }
  .prog-pct { font-size:14px; font-weight:600; font-family:var(--font-number); letter-spacing:-0.2px; }
  .prog-sub { display:block; font-size:11px; color:var(--ink-dim); margin-bottom:14px; }
  .prog-track { width:100%; height:8px; border-radius:999px; overflow:hidden; background:#e8e3dd; }
  .prog-bar { height:100%; border-radius:999px; transition:width 0.6s ease; }
  .prog-bar.today { background:var(--accent); }
  .prog-bar.month { background:var(--accent2); }

  /* ── 面板通用 ── */
  .panel {
    background:var(--card); border-radius:20px; padding:30px 28px;
    box-shadow:var(--shadow); border:1px solid var(--border);
  }
  .panel-title { font-size:17px; font-weight:600; margin-bottom:4px; }
  .panel-desc { font-size:12px; color:var(--ink-dim); line-height:1.6; margin-bottom:18px; }
  .field-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
  .field { display:flex; flex-direction:column; gap:6px; min-width:0; }
  .field label { font-size:12px; color:var(--ink-dim); font-weight:500; }
  .field input {
    width:100%; box-sizing:border-box; min-width:0;
    height:46px; padding:0 14px; border-radius:var(--radius-sm);
    border:1px solid var(--border); background:#fafaf8;
    color:var(--ink); font-size:14px; outline:none; font-family:inherit;
  }
  .field input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(232,96,58,0.1); }
  .btn {
    width:100%; height:48px; border:none; border-radius:999px;
    background:var(--ink); color:#fff; font-size:14px; font-weight:600;
    cursor:pointer; transition:opacity .2s, transform .2s;
  }
  .btn:active { opacity:.8; transform:scale(.98); }

  /* ── 日历 ── */
  .cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .cal-header-title { font-size:15px; font-weight:600; }
  .cal-nav { display:flex; gap:8px; }
  .cal-nav-btn {
    width:32px; height:32px; border:none; border-radius:50%;
    background:var(--bg); color:var(--ink); font-size:16px; line-height:1;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .cal-nav-btn:active { background:#e8e3dd; }
  .cal-row { display:grid; grid-template-columns:repeat(7, 1fr); gap:2px; }
  .cal-row.weekdays { margin-bottom:4px; }
  .cal-row.weekdays .cal-cell { padding:6px 0; font-size:10px; color:var(--ink-dim); font-weight:600; }
  .cal-cell {
    text-align:center; padding:6px 2px; font-size:12px; font-weight:500;
    border-radius:8px; background:transparent; color:var(--ink-dim);
    min-width:0; transition:background .2s;
    cursor:pointer; user-select:none; position:relative;
    display:flex; align-items:center; justify-content:center;
    aspect-ratio:1.15;
  }
  .cal-cell.work { background:#f6f3ee; color:var(--ink); }
  .cal-cell.off { color:#c5c0b8; }
  .cal-cell.holiday { background:#fff0ed; color:var(--accent); cursor:pointer; }
  .cal-cell.today { background:var(--accent); color:#fff; font-weight:700; box-shadow:0 2px 8px rgba(232,96,58,0.22); }
  .cal-cell.overtime { background:var(--accent2); color:#fff; font-weight:600; }
  .cal-cell.leave { background:var(--gold); color:#fff; font-weight:600; }
  .cal-cell.holiday.overtime { background:var(--accent2); color:#fff; }
  .cal-cell-tag {
    position:absolute; top:-4px; right:-4px;
    width:16px; height:16px; border-radius:50%;
    font-size:9px; font-weight:700; line-height:16px; text-align:center;
    color:#fff; z-index:2;
  }
  .cal-cell-tag.ot-tag { background:var(--accent2); }
  .cal-cell-tag.lv-tag { background:var(--gold); }

  /* ── 响应式 ── */
  @media (min-width:700px) {
    .app { padding:44px 36px 72px; }
    .progress-row { grid-template-columns:1fr 1fr; }
  }
  @media (min-width:1000px) {
    .dashboard { grid-template-columns:1fr 340px; gap:40px; }
    .main-col { display:flex; flex-direction:column; gap:32px; }
    .side-col { display:flex; flex-direction:column; gap:32px; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- 顶栏 -->
  <div class="topbar">
    <span class="brand">Salary Engine</span>
    <span class="timestamp" id="topTime">--</span>
  </div>

  <!-- Hero -->
  <div class="hero-card">
    <div class="hero-left">
      <div class="hero-title">精确计算每一秒的价值</div>
      <div class="hero-sub" id="heroSub">--</div>
    </div>
    <div class="hero-kpi">
      <span class="hero-kpi-label">本月有效工作日</span>
      <span class="hero-kpi-value" id="heroWorkdays">--</span>
    </div>
  </div>

  <!-- 两列布局容器 -->
  <div class="dashboard" id="dashboardRoot">
    <!-- 左列 -->
    <div class="main-col" id="mainCol">
      <!-- 指标磁贴 -->
      <div class="tiles">
        <div class="tile">
          <span class="tile-label">今日累计</span>
          <span class="tile-value accent" id="todayEarned">--</span>
          <span class="tile-hint" id="todayHint">--</span>
        </div>
        <div class="tile">
          <span class="tile-label">本月累计</span>
          <span class="tile-value accent2" id="monthEarned">--</span>
          <span class="tile-hint" id="monthHint">--</span>
        </div>
        <div class="tile">
          <span class="tile-label">法定日薪</span>
          <span class="tile-value accent3" id="dailySalary">--</span>
          <span class="tile-hint" id="dailyHint">--</span>
        </div>
        <div class="tile">
          <span class="tile-label">实时时钟</span>
          <span class="tile-value" id="liveClock">--:--:--</span>
          <span class="tile-hint" id="clockHint">--</span>
        </div>
      </div>

      <!-- 进度条 -->
      <div class="progress-row">
        <div class="prog-card">
          <div class="prog-header">
            <span class="prog-title">今日进度</span>
            <span class="prog-pct" style="color:var(--accent)" id="todayPct">0.00%</span>
          </div>
          <span class="prog-sub" id="todaySub">--</span>
          <div class="prog-track"><div class="prog-bar today" id="todayBar" style="width:0%"></div></div>
        </div>
        <div class="prog-card">
          <div class="prog-header">
            <span class="prog-title">本月进度</span>
            <span class="prog-pct" style="color:var(--accent2)" id="monthPct">0.00%</span>
          </div>
          <span class="prog-sub" id="monthSub">--</span>
          <div class="prog-track"><div class="prog-bar month" id="monthBar" style="width:0%"></div></div>
        </div>
      </div>

      <!-- 日历 -->
      <div class="panel" id="calendarPanel">
        <div class="panel-title">工作日历</div>
        <div class="cal-header">
          <span class="cal-header-title" id="calMonthLabel">--</span>
          <div class="cal-nav">
            <button class="cal-nav-btn" id="calPrev">&lt;</button>
            <button class="cal-nav-btn" id="calNext">&gt;</button>
          </div>
        </div>
        <div class="panel-desc" id="calDesc">--</div>
        <div class="cal-row weekdays">
          <span class="cal-cell">一</span><span class="cal-cell">二</span><span class="cal-cell">三</span>
          <span class="cal-cell">四</span><span class="cal-cell">五</span><span class="cal-cell">六</span><span class="cal-cell">日</span>
        </div>
        <div class="cal-row" id="calGrid"></div>
      </div>
    </div>

    <!-- 右列 -->
    <div class="side-col" id="sideCol">
      <div class="panel" id="configPanel">
        <div class="panel-title">薪资引擎</div>
        <div class="panel-desc">基础日薪 = 月薪 ÷ 法定工作日<br>月实发 = 基础日薪 × 有效工作日<br><br>工作日点击→请假 · 周末点击→加班</div>
        <div class="field-row">
          <div class="field"><label>基础月薪 (¥)</label><input type="number" id="baseSalary" value="12000" step="100"></div>
          <div class="field">
            <label>已选加班天数</label>
            <input type="text" id="overtimeDays" value="2" readonly style="background:#f6f3ee;cursor:default;color:var(--accent2);font-weight:600;">
          </div>
        </div>
        <div class="field-row">
          <div class="field"><label>上班时间</label><input type="time" id="workStart" value="09:00"></div>
          <div class="field"><label>下班时间</label><input type="time" id="workEnd" value="18:30"></div>
        </div>
        <button class="btn" id="btnSave">保存配置</button>
      </div>
    </div>
  </div>
</div>

<script>
// ====== 节假日 ======
var HOLIDAYS = (function(){
  var s = {};
  [
    '2026-01-01',
    '2026-02-16','2026-02-17','2026-02-18','2026-02-19','2026-02-20','2026-02-21',
    '2026-04-05',
    '2026-05-01','2026-05-02','2026-05-03',
    '2026-06-19','2026-06-20','2026-06-21',
    '2026-09-25','2026-09-26','2026-09-27',
    '2026-10-01','2026-10-02','2026-10-03','2026-10-04','2026-10-05','2026-10-06','2026-10-07',
  ].forEach(function(d){ s[d] = true; });
  return s;
})();

function isHoliday(y,m,d){ return HOLIDAYS[y+'-'+pad(m+1)+'-'+pad(d)]===true; }

// overtimeDates: 周末/节假日标记为加班的日期
var overtimeDates = new Set();
// leaveDates: 正常工作日标记为请假的日期
var leaveDates = new Set();

function keyDate(y,m,d){ return y+'-'+pad(m+1)+'-'+pad(d); }

function isOvertime(y,m,d){ return overtimeDates.has(keyDate(y,m,d)); }
function isLeave(y,m,d){ return leaveDates.has(keyDate(y,m,d)); }

// 有效工作日 = 自然工作日 - 请假 + 周末节假日加班
function isEffectiveWorkday(y,m,d){
  var dw=new Date(y,m,d).getDay();
  var wk = dw===0||dw===6;
  var hol = isHoliday(y,m,d);
  if ((wk || hol) && isOvertime(y,m,d)) return true;
  if (!wk && !hol && isLeave(y,m,d)) return false;
  if (!wk && !hol) return true;
  return false;
}

// 自然工作日 = 周一-周五非节假日
function isLegalWorkday(y,m,d){
  var dw=new Date(y,m,d).getDay();
  return dw!==0&&dw!==6&&!isHoliday(y,m,d);
}

// ====== 工具 ======
function pad(n){ return ('0'+n).slice(-2); }
function fmt(n,d){ return n.toFixed(d||2); }
function cny(n){ return '¥'+fmt(n); }

// ====== 全局状态 ======
var settings = { baseSalary:12000, workStart:'09:00', workEnd:'18:30', timezone:'' };

function load(){
  try{
    var r=localStorage.getItem('wage-cosmos');
    if(r){
      var s=JSON.parse(r);
      settings.baseSalary=s.baseSalary||12000;
      settings.workStart=s.workStart||'09:00';
      settings.workEnd=s.workEnd||'18:30';
      if (s.overtimeDates && Array.isArray(s.overtimeDates)) {
        overtimeDates = new Set(s.overtimeDates);
      }
      if (s.leaveDates && Array.isArray(s.leaveDates)) {
        leaveDates = new Set(s.leaveDates);
      }
    }
  }catch(e){}
  settings.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone||'Asia/Shanghai';
  document.getElementById('baseSalary').value=settings.baseSalary;
  document.getElementById('workStart').value=settings.workStart;
  document.getElementById('workEnd').value=settings.workEnd;
  updateOvertimeDisplay();
}

function save(){
  settings.baseSalary=+document.getElementById('baseSalary').value||12000;
  settings.workStart=document.getElementById('workStart').value||'09:00';
  settings.workEnd=document.getElementById('workEnd').value||'18:30';
  localStorage.setItem('wage-cosmos',JSON.stringify({
    baseSalary:settings.baseSalary,
    workStart:settings.workStart,
    workEnd:settings.workEnd,
    overtimeDates: Array.from(overtimeDates),
    leaveDates: Array.from(leaveDates)
  }));
  compute();
}

// ====== 计算 ======
function compute(){
  var now = new Date();
  var y=now.getFullYear(), m=now.getMonth(), d=now.getDate();

  // 工作日总数
  var daysInM = new Date(y,m+1,0).getDate();
  var legalWorkdays = 0;
  for(var dd=1; dd<=daysInM; dd++) if(isLegalWorkday(y,m,dd)) legalWorkdays++;

  // 有效工作日
  var effectiveWorkdays = 0;
  for(var dd=1; dd<=daysInM; dd++) if(isEffectiveWorkday(y,m,dd)) effectiveWorkdays++;

  var overtimeCount = 0;  // 周末/节假日标记为加班的天数
  var leaveCount = 0;      // 工作日标记为请假的天数
  for(var dd=1; dd<=daysInM; dd++){
    var isHolOrWk = isHoliday(y,m,dd) || (new Date(y,m,dd).getDay()===0 || new Date(y,m,dd).getDay()===6);
    if (isHolOrWk && isOvertime(y,m,dd)) overtimeCount++;
    if (!isHolOrWk && isLeave(y,m,dd)) leaveCount++;
  }
  updateOvertimeDisplay();

  document.getElementById('heroWorkdays').textContent = effectiveWorkdays;

  // 日薪 & 月预计
  var legalDailySalary = legalWorkdays ? settings.baseSalary / legalWorkdays : 0;
  var projectedMonthly = legalDailySalary * effectiveWorkdays;

  // 今日进度
  var st = settings.workStart.split(':'), et = settings.workEnd.split(':');
  var ws = new Date(y,m,d,+st[0],+st[1],0).getTime();
  var we = new Date(y,m,d,+et[0],+et[1],0).getTime();
  var totalMin = Math.max((we-ws)/60000, 1);
  var workedMin = Math.min(Math.max((now.getTime()-ws)/60000, 0), totalMin);
  var todayProgress = workedMin / totalMin;
  var remainingMin = Math.max(totalMin - workedMin, 0);
  var earnedToday = isEffectiveWorkday(y,m,d) ? legalDailySalary * todayProgress : 0;

  // 本月累计
  var earnedBefore = 0;
  for(var dd=1; dd<d; dd++) if(isEffectiveWorkday(y,m,dd)) earnedBefore += legalDailySalary;
  var earnedMonth = earnedBefore + (isEffectiveWorkday(y,m,d) ? earnedToday : 0);
  var monthProgress = projectedMonthly ? Math.min(earnedMonth / projectedMonthly, 1) : 0;

  // ── 更新 DOM ──
  document.getElementById('todayEarned').textContent = cny(earnedToday);
  document.getElementById('monthEarned').textContent = cny(earnedMonth);
  document.getElementById('dailySalary').textContent = cny(legalDailySalary);

  // 静态文本
  document.getElementById('todayHint').textContent = '已工作 ' + Math.floor(workedMin/60) + 'h ' + Math.round(workedMin%60) + 'm';
  document.getElementById('monthHint').textContent = '预计到手 ' + cny(projectedMonthly);
  document.getElementById('dailyHint').textContent =
    '加班 +' + overtimeCount + ' 天  ·  请假 -' + leaveCount + ' 天';

  // 进度条
  var tpct = todayProgress * 100;
  document.getElementById('todayPct').textContent = fmt(tpct) + '%';
  document.getElementById('todayBar').style.width = fmt(tpct) + '%';
  document.getElementById('todaySub').textContent = '距离下班 ' + Math.floor(remainingMin/60) + 'h ' + Math.round(remainingMin%60) + 'm' + ' · ' + settings.workStart + '-' + settings.workEnd;

  var mpct = monthProgress * 100;
  document.getElementById('monthPct').textContent = fmt(mpct) + '%';
  document.getElementById('monthBar').style.width = fmt(mpct) + '%';
  document.getElementById('monthSub').textContent = '累计 ' + cny(earnedMonth) + ' / ' + cny(projectedMonthly);

  // 日历描述
  document.getElementById('calDesc').textContent =
    '工作日点按请假  ·  周末/节假日点按加班';
}

function updateOvertimeDisplay(){
  var ot = document.getElementById('overtimeDays');
  var add = overtimeDates.size;
  var sub = leaveDates.size;
  if (add || sub) {
    var parts = [];
    if (add) parts.push('+'+add);
    if (sub) parts.push('-'+sub);
    ot.value = parts.join(' ') + ' 天';
  } else {
    ot.value = '0 天';
  }
}

// ====== 日历渲染 ======
var calViewYear = 0, calViewMonth = 0;

function updateMonthLabel(){
  document.getElementById('calMonthLabel').textContent =
    calViewYear + '年' + (calViewMonth + 1) + '月';
}

function renderCal(y, m, realToday, realNow){
  calViewYear = y; calViewMonth = m;
  updateMonthLabel();
  var todayDate = (y === realNow.getFullYear() && m === realNow.getMonth()) ? realToday : -1;

  var grid = document.getElementById('calGrid');
  var days = new Date(y,m+1,0).getDate();
  var fd = new Date(y,m,1).getDay();
  var off = fd===0?6:fd-1;
  grid.innerHTML = '';
  for(var i=0;i<off;i++){ var e=document.createElement('span'); e.className='cal-cell'; e.style.visibility='hidden'; grid.appendChild(e); }
  for(var day=1;day<=days;day++){
    var cell=document.createElement('span');
    cell.className='cal-cell';
    var dow=new Date(y,m,day).getDay();
    var wk=dow===0||dow===6;
    var hol=isHoliday(y,m,day);
    var ot=isOvertime(y,m,day);
    var lv=isLeave(y,m,day);

    if(day===todayDate) cell.classList.add('today');
    if(ot) { cell.classList.add('overtime'); cell.classList.remove('work','holiday','off'); }
    if(lv) { cell.classList.add('leave'); cell.classList.remove('work','holiday','off'); }

    // 纯样式兜底（未被 ot/lv/today 覆盖时）
    if (!ot && !lv && day!==todayDate) {
      if(hol) cell.classList.add('holiday');
      else if(wk) cell.classList.add('off');
      else cell.classList.add('work');
    }
    if (day===todayDate && !ot && !lv) {
      // today 不带 ot/lv 时保持 today 样式
    }

    // 数字
    var numSpan = document.createElement('span');
    numSpan.textContent = day;
    cell.appendChild(numSpan);

    // 标签（绝对定位圆点）
    var tagText = '';
    var tagClass = '';
    if (ot) { tagText = '加'; tagClass = 'ot-tag'; }
    else if (lv) { tagText = '休'; tagClass = 'lv-tag'; }

    if(tagText){
      var t=document.createElement('span');
      t.className = 'cal-cell-tag ' + tagClass;
      t.textContent = tagText;
      cell.appendChild(t);
    }

    // 点击切换（所有月份都可操作，包括今天）
    (function(cellDay, isWk, isHol){
      cell.addEventListener('click', function(){
        var kk = keyDate(y, m, cellDay);
        if (isWk || isHol) {
          if (overtimeDates.has(kk)) overtimeDates.delete(kk);
          else overtimeDates.add(kk);
        } else {
          if (leaveDates.has(kk)) leaveDates.delete(kk);
          else leaveDates.add(kk);
        }
        updateOvertimeDisplay();
        save();
        renderCal(y, m, realToday, realNow);
      });
    })(day, wk, hol);

    grid.appendChild(cell);
  }
}

// ====== 更新循环 ======
function tick(){
  var now = new Date();
  var hh=pad(now.getHours()), mm=pad(now.getMinutes()), ss=pad(now.getSeconds());

  // 顶栏时间
  document.getElementById('topTime').textContent = now.getFullYear()+'年'+pad(now.getMonth()+1)+'月'+pad(now.getDate())+'日 '+hh+':'+mm+':'+ss;

  // 实时时钟
  document.getElementById('liveClock').textContent = hh+':'+mm+':'+ss;
  document.getElementById('clockHint').textContent = settings.timezone;
  document.getElementById('heroSub').textContent = '时区 ' + settings.timezone + ' · ' + now.getFullYear() + '/' + pad(now.getMonth()+1) + '/' + pad(now.getDate());

  // 如果是当前月，更新全部数据；否则只更新时钟不停留在回顾月
  var yy = now.getFullYear(), mm = now.getMonth();
  if (yy === calViewYear && mm === calViewMonth) {
    compute();
    renderCal(now.getFullYear(), now.getMonth(), now.getDate(), now);
  }
  // 非当前月：不干扰用户正在浏览的月份
}

function goMonth(delta){
  calViewMonth += delta;
  if (calViewMonth < 0) { calViewMonth = 11; calViewYear--; }
  if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
  var now = new Date();
  if (calViewYear === now.getFullYear() && calViewMonth === now.getMonth()) {
    compute();
    renderCal(now.getFullYear(), now.getMonth(), now.getDate(), now);
  } else {
    computeMonth(calViewYear, calViewMonth, now);
  }
}

function computeMonth(y, m, realNow){
  calViewYear = y; calViewMonth = m;
  updateMonthLabel();
  var legalWorkdays = 0, effectiveWorkdays = 0;
  var overtimeCount = 0, leaveCount = 0;
  var daysInM = new Date(y,m+1,0).getDate();
  for(var dd=1; dd<=daysInM; dd++){
    if (isLegalWorkday(y,m,dd)) legalWorkdays++;
    if (isEffectiveWorkday(y,m,dd)) effectiveWorkdays++;
    var isHolOrWk = isHoliday(y,m,dd) || (new Date(y,m,dd).getDay()===0 || new Date(y,m,dd).getDay()===6);
    if (isHolOrWk && isOvertime(y,m,dd)) overtimeCount++;
    if (!isHolOrWk && isLeave(y,m,dd)) leaveCount++;
  }
  document.getElementById('heroWorkdays').textContent = effectiveWorkdays;
  document.getElementById('calDesc').textContent =
    '法定 ' + legalWorkdays + ' 天 · 加班 +' + overtimeCount + ' · 请假 -' + leaveCount + ' 天（回顾模式）';
  // 清除实时数据
  document.getElementById('todayEarned').textContent = '¥0.00';
  document.getElementById('monthEarned').textContent = cny(legalWorkdays ? settings.baseSalary / legalWorkdays * effectiveWorkdays : 0);
  document.getElementById('todayPct').textContent = '0.00%';
  document.getElementById('todayBar').style.width = '0%';
  document.getElementById('monthPct').textContent = '100.00%';
  document.getElementById('monthBar').style.width = '100%';
  document.getElementById('todaySub').textContent = '回顾模式 · ' + y + '年' + (m+1) + '月';
  document.getElementById('monthSub').textContent = '累计 ' + cny(settings.baseSalary / Math.max(legalWorkdays,1) * effectiveWorkdays);
  renderCal(y, m, -1, realNow);
}

// ====== 响应式 ======
function adapt(){
  var w = window.innerWidth;
  var mc = document.getElementById('mainCol');
  var sc = document.getElementById('sideCol');
  var cp = document.getElementById('configPanel');
  var calp = document.getElementById('calendarPanel');
  var dr = document.getElementById('dashboardRoot');

  if (w >= 1000) {
    dr.style.gridTemplateColumns = '1fr 340px';
    if (cp.parentNode !== sc) sc.appendChild(cp);
    if (calp.parentNode !== mc) mc.appendChild(calp);
  } else {
    dr.style.gridTemplateColumns = '1fr';
    if (cp.parentNode !== mc) mc.appendChild(cp);
    if (calp.parentNode !== mc) mc.appendChild(calp);
  }
}

// ====== 启动 ======
(function init(){
  adapt();
  window.addEventListener('resize', adapt);
  load();

  var now = new Date();
  calViewYear = now.getFullYear();
  calViewMonth = now.getMonth();
  updateMonthLabel();
  compute();
  renderCal(now.getFullYear(), now.getMonth(), now.getDate(), now);

  document.getElementById('btnSave').addEventListener('click', save);
  document.getElementById('calPrev').addEventListener('click', function(){ goMonth(-1); });
  document.getElementById('calNext').addEventListener('click', function(){ goMonth(1); });

  setInterval(tick, 1000);
})();
</script>
