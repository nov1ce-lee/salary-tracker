<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>薪资引擎 · Salary Engine</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231a1a1a'/><text x='16' y='23' text-anchor='middle' font-size='20'>⚡</text></svg>">
<style>
  :root {
    --bg: #f8f5f0;
    --card: #ffffff;
    --ink: #1a1a1a;
    --ink-dim: #6b6b6b;
    --accent: #e8603a;
    --accent2: #2d85c7;
    --accent3: #3a9d5e;
    --border: #e8e3dd;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 6px 20px rgba(0,0,0,0.05);
    --radius: 16px;
    --radius-sm: 10px;
    --font-number: 'Avenir Next', 'Helvetica Neue', 'Segoe UI', Arial, sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: ''; position:fixed; inset:0; z-index:0; pointer-events:none;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='0.5' cy='0.5' r='0.5' fill='%23d8d3cc' opacity='0.5'/%3E%3C/svg%3E") repeat;
    background-size: 60px 60px;
  }

  .app {
    position:relative; z-index:1; width:100%; max-width:1200px; margin:0 auto; padding:36px 28px 64px;
  }

  .topbar {
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px;
    margin-bottom:28px;
  }
  .brand { font-size:13px; font-weight:600; letter-spacing:3px; color:var(--ink-dim); text-transform:uppercase; }
  .timestamp { font-size:12px; color:var(--ink-dim); font-family:var(--font-number); }

  .dashboard {
    display:grid; grid-template-columns:1fr; gap:32px;
  }

  .hero-card {
    background:var(--card); border-radius:24px; padding:34px 36px 30px;
    box-shadow:var(--shadow); border:1px solid var(--border);
    display:flex; flex-wrap:wrap; align-items:flex-end; justify-content:space-between;
    gap:26px; margin-bottom:4px;
  }
  .hero-left { flex:1; min-width:240px; }
  .hero-title {
    font-size:clamp(22px,3.5vw,36px); font-weight:700; letter-spacing:-0.5px;
    line-height:1.15; margin-bottom:6px;
  }
  .hero-sub { font-size:13px; color:var(--ink-dim); line-height:1.6; max-width:480px; }
  .hero-kpi {
    display:flex; flex-direction:column; align-items:flex-end; gap:4px;
    padding:20px 24px; border-radius:20px;
    background:var(--bg); min-width:140px;
  }
  .hero-kpi-label { font-size:11px; color:var(--ink-dim); letter-spacing:1px; text-transform:uppercase; }
  .hero-kpi-value { font-size:48px; font-weight:700; color:var(--accent); line-height:1; font-family:var(--font-number); letter-spacing:-1px; }

  .tiles {
    display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:20px;
  }
  .tile {
    background:var(--card); border-radius:20px; padding:24px 22px;
    box-shadow:var(--shadow); border:1px solid var(--border);
    display:flex; flex-direction:column; gap:8px;
  }
  .tile-label { font-size:11px; color:var(--ink-dim); letter-spacing:0.5px; }
  .tile-value {
    font-size:clamp(20px,3.5vw,30px); font-weight:700; line-height:1;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    font-family:var(--font-number); letter-spacing:-0.5px;
  }
  .tile-value.accent  { color:var(--accent); }
  .tile-value.accent2 { color:var(--accent2); }
  .tile-value.accent3 { color:var(--accent3); }
  .tile-hint { font-size:11px; color:var(--ink-dim); opacity:0.7; }

  .progress-row { display:grid; grid-template-columns:1fr; gap:18px; }
  .prog-card {
    background:var(--card); border-radius:20px; padding:22px 24px;
    box-shadow:var(--shadow); border:1px solid var(--border);
  }
  .prog-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .prog-title { font-size:15px; font-weight:600; }
  .prog-pct { font-size:14px; font-weight:600; font-family:var(--font-number); letter-spacing:-0.2px; }
  .prog-sub { display:block; font-size:11px; color:var(--ink-dim); margin-bottom:14px; }
  .prog-track { width:100%; height:8px; border-radius:999px; overflow:hidden; background:#e8e3dd; }
  .prog-bar { height:100%; border-radius:999px; transition:width 0.6s ease; }
  .prog-bar.today { background:var(--accent); }
  .prog-bar.month { background:var(--accent2); }

  .panel {
    background:var(--card); border-radius:20px; padding:30px 28px;
    box-shadow:var(--shadow); border:1px solid var(--border);
  }
  .panel-title { font-size:17px; font-weight:600; margin-bottom:4px; }
  .panel-desc { font-size:12px; color:var(--ink-dim); line-height:1.6; margin-bottom:18px; }
  .field-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
  .field { display:flex; flex-direction:column; gap:6px; min-width:0; }
  .field label { font-size:12px; color:var(--ink-dim); font-weight:500; }
  .field input {
    width:100%; box-sizing:border-box; min-width:0;
    height:46px; padding:0 14px; border-radius:var(--radius-sm);
    border:1px solid var(--border); background:#fafaf8;
    color:var(--ink); font-size:14px; outline:none; font-family:inherit;
  }
  .field input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(232,96,58,0.1); }
  .btn {
    width:100%; height:48px; border:none; border-radius:999px;
    background:var(--ink); color:#fff; font-size:14px; font-weight:600;
    cursor:pointer; transition:opacity .2s, transform .2s;
  }
  .btn:active { opacity:.8; transform:scale(.98); }

  /* 日历 */
  .cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .cal-header-title { font-size:15px; font-weight:600; }
  .cal-nav { display:flex; gap:8px; }
  .cal-nav-btn {
    width:32px; height:32px; border:none; border-radius:50%;
    background:var(--bg); color:var(--ink); font-size:16px; line-height:1;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .cal-nav-btn:active { background:#e8e3dd; }
  .cal-row { display:grid; grid-template-columns:repeat(7, 1fr); gap:2px; }
  .cal-row.weekdays { margin-bottom:4px; }
  .cal-row.weekdays .cal-cell { padding:6px 0; font-size:10px; color:var(--ink-dim); font-weight:600; }
  .cal-cell {
    text-align:center; padding:6px 2px; font-size:12px; font-weight:500;
    border-radius:8px; background:transparent; color:var(--ink-dim);
    min-width:0; transition:background .2s;
    cursor:pointer; user-select:none; position:relative;
    display:flex; align-items:center; justify-content:center;
    aspect-ratio:1.15;
  }
  .cal-cell-tag {
    position:absolute; top:-4px; right:-4px;
    width:16px; height:16px; border-radius:50%;
    font-size:9px; font-weight:700; line-height:16px; text-align:center;
    color:#fff; z-index:2;
  }

  @media (min-width:700px) {
    .app { padding:44px 36px 72px; }
    .progress-row { grid-template-columns:1fr 1fr; }
  }
  @media (min-width:1000px) {
    .dashboard { grid-template-columns:1fr 340px; gap:40px; }
    .main-col { display:flex; flex-direction:column; gap:32px; }
    .side-col { display:flex; flex-direction:column; gap:32px; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <span class="brand">Salary Engine</span>
    <span class="timestamp" id="topTime">--</span>
  </div>

  <div class="hero-card">
    <div class="hero-left">
      <div class="hero-title">精确计算每一秒的价值</div>
      <div class="hero-sub" id="heroSub">--</div>
    </div>
    <div class="hero-kpi">
      <span class="hero-kpi-label">本月有效工作日</span>
      <span class="hero-kpi-value" id="heroWorkdays">--</span>
    </div>
  </div>

  <div class="dashboard" id="dashboardRoot">
    <div class="main-col" id="mainCol">
      <div class="tiles">
        <div class="tile">
          <span class="tile-label">今日累计</span>
          <span class="tile-value accent" id="todayEarned">--</span>
          <span class="tile-hint" id="todayHint">--</span>
        </div>
        <div class="tile">
          <span class="tile-label">本月累计</span>
          <span class="tile-value accent2" id="monthEarned">--</span>
          <span class="tile-hint" id="monthHint">--</span>
        </div>
        <div class="tile">
          <span class="tile-label">法定日薪</span>
          <span class="tile-value accent3" id="dailySalary">--</span>
          <span class="tile-hint" id="dailyHint">--</span>
        </div>
        <div class="tile">
          <span class="tile-label">实时时钟</span>
          <span class="tile-value" id="liveClock">--:--:--</span>
          <span class="tile-hint" id="clockHint">--</span>
        </div>
      </div>

      <div class="progress-row">
        <div class="prog-card">
          <div class="prog-header">
            <span class="prog-title">今日进度</span>
            <span class="prog-pct" style="color:var(--accent)" id="todayPct">0.00%</span>
          </div>
          <span class="prog-sub" id="todaySub">--</span>
          <div class="prog-track"><div class="prog-bar today" id="todayBar" style="width:0%"></div></div>
        </div>
        <div class="prog-card">
          <div class="prog-header">
            <span class="prog-title">本月进度</span>
            <span class="prog-pct" style="color:var(--accent2)" id="monthPct">0.00%</span>
          </div>
          <span class="prog-sub" id="monthSub">--</span>
          <div class="prog-track"><div class="prog-bar month" id="monthBar" style="width:0%"></div></div>
        </div>
      </div>

      <div class="panel" id="calendarPanel">
        <div class="panel-title">工作日历</div>
        <div class="cal-header">
          <span class="cal-header-title" id="calMonthLabel">--</span>
          <div class="cal-nav">
            <button class="cal-nav-btn" id="calPrev">&lt;</button>
            <button class="cal-nav-btn" id="calNext">&gt;</button>
          </div>
        </div>
        <div class="panel-desc" id="calDesc">--</div>
        <div class="cal-row weekdays">
          <span class="cal-cell">一</span><span class="cal-cell">二</span><span class="cal-cell">三</span>
          <span class="cal-cell">四</span><span class="cal-cell">五</span><span class="cal-cell">六</span><span class="cal-cell">日</span>
        </div>
        <div class="cal-row" id="calGrid"></div>
      </div>
    </div>

    <div class="side-col" id="sideCol">
      <div class="panel" id="configPanel">
        <div class="panel-title">薪资引擎</div>
        <div class="panel-desc">基础日薪 = 月薪 ÷ 法定工作日<br>月实发 = 基础日薪 × 有效工作日<br><br>工作日点击→请假 · 周末点击→加班</div>
        <div class="field-row">
          <div class="field"><label>基础月薪 (¥)</label><input type="number" id="baseSalary" value="12000" step="100"></div>
          <div class="field">
            <label>已选变更</label>
            <input type="text" id="overtimeDays" value="0 天" readonly style="background:#f6f3ee;cursor:default;color:var(--accent2);font-weight:600;">
          </div>
        </div>
        <div class="field-row">
          <div class="field"><label>上班时间</label><input type="time" id="workStart" value="09:00"></div>
          <div class="field"><label>下班时间</label><input type="time" id="workEnd" value="18:30"></div>
        </div>
        <button class="btn" id="btnSave">保存配置</button>
      </div>
    </div>
  </div>
</div>

<script>
// ====== 节假日 ======
var HOLIDAYS = {'2026-01-01':1,'2026-02-16':1,'2026-02-17':1,'2026-02-18':1,'2026-02-19':1,'2026-02-20':1,'2026-02-21':1,'2026-04-05':1,'2026-05-01':1,'2026-05-02':1,'2026-05-03':1,'2026-06-19':1,'2026-06-20':1,'2026-06-21':1,'2026-09-25':1,'2026-09-26':1,'2026-09-27':1,'2026-10-01':1,'2026-10-02':1,'2026-10-03':1,'2026-10-04':1,'2026-10-05':1,'2026-10-06':1,'2026-10-07':1};

function pad(n){return('0'+n).slice(-2);}
function fmt(n,d){return n.toFixed(d||2);}
function cny(n){return'¥'+fmt(n);}
function key(y,m,d){return y+'-'+pad(m+1)+'-'+pad(d);}

function isHoliday(y,m,d){return HOLIDAYS[key(y,m,d)]===1;}
function isWeekend(y,m,d){var w=new Date(y,m,d).getDay();return w===0||w===6;}
function isLegalWorkday(y,m,d){return!isWeekend(y,m,d)&&!isHoliday(y,m,d);}

// 全局 Sets：存所有月份的标记日期
var OT=new Set();  // overtimeDates
var LV=new Set();  // leaveDates

function isOvertime(y,m,d){return OT.has(key(y,m,d));}
function isLeave(y,m,d){return LV.has(key(y,m,d));}

function isEffectiveWorkday(y,m,d){
  if(isLeave(y,m,d))return false;
  if(isOvertime(y,m,d))return true;
  return isLegalWorkday(y,m,d);
}

// ====== 统计指定月份的加班/请假天数 ======
function countOT(y,m){var ds=new Date(y,m+1,0).getDate(),n=0;for(var d=1;d<=ds;d++)if(isOvertime(y,m,d))n++;return n;}
function countLV(y,m){var ds=new Date(y,m+1,0).getDate(),n=0;for(var d=1;d<=ds;d++)if(isLeave(y,m,d))n++;return n;}

// ====== 设置 ======
var S={baseSalary:12000,workStart:'09:00',workEnd:'18:30',timezone:''};

function load(){
  try{
    var r=localStorage.getItem('wage-cosmos');
    if(r){var s=JSON.parse(r);S.baseSalary=s.baseSalary||12000;S.workStart=s.workStart||'09:00';S.workEnd=s.workEnd||'18:30';
      if(s.OT)OT=new Set(s.OT);if(s.LV)LV=new Set(s.LV);}
  }catch(e){}
  S.timezone=Intl.DateTimeFormat().resolvedOptions().timeZone||'Asia/Shanghai';
  document.getElementById('baseSalary').value=S.baseSalary;
  document.getElementById('workStart').value=S.workStart;
  document.getElementById('workEnd').value=S.workEnd;
}

function persist(){
  S.baseSalary=+document.getElementById('baseSalary').value||12000;
  S.workStart=document.getElementById('workStart').value||'09:00';
  S.workEnd=document.getElementById('workEnd').value||'18:30';
  localStorage.setItem('wage-cosmos',JSON.stringify({baseSalary:S.baseSalary,workStart:S.workStart,workEnd:S.workEnd,OT:Array.from(OT),LV:Array.from(LV)}));
}

// ====== 核心：按年月刷新全部 UI ======
function refresh(y,m,now){
  var isNow=(y===now.getFullYear()&&m===now.getMonth());
  var ds=new Date(y,m+1,0).getDate(), d=now.getDate();

  var lw=0,ew=0,ot=0,lv=0;
  for(var dd=1;dd<=ds;dd++){
    if(isLegalWorkday(y,m,dd))lw++;
    if(isEffectiveWorkday(y,m,dd))ew++;
    if(isWeekend(y,m,dd)||isHoliday(y,m,dd)){if(isOvertime(y,m,dd))ot++;}
    else{if(isLeave(y,m,dd))lv++;}
  }

  // 右上角显示
  var otEl=document.getElementById('overtimeDays');
  var p=[];if(ot)p.push('+'+ot);if(lv)p.push('-'+lv);
  otEl.value=(ot||lv)?p.join(' ')+' 天':'0 天';

  var dp=lw?S.baseSalary/lw:0;
  var proj=dp*ew;

  var st=S.workStart.split(':'),et=S.workEnd.split(':');
  var ws=new Date(y,m,d,+st[0],+st[1],0).getTime();
  var we=new Date(y,m,d,+et[0],+et[1],0).getTime();
  var tm=Math.max((we-ws)/60000,1);

  if(isNow){
    var wk=Math.min(Math.max((now.getTime()-ws)/60000,0),tm);
    var tp=wk/tm,rm=Math.max(tm-wk,0);
    var td=isEffectiveWorkday(y,m,d)?dp*tp:0;
    var eb=0;for(var dd=1;dd<d;dd++)if(isEffectiveWorkday(y,m,dd))eb+=dp;
    var em=eb+(isEffectiveWorkday(y,m,d)?td:0);
    var mp=proj?Math.min(em/proj,1):0;

    document.getElementById('todayEarned').textContent=cny(td);
    document.getElementById('monthEarned').textContent=cny(em);
    document.getElementById('todayHint').textContent='已工作 '+Math.floor(wk/60)+'h '+Math.round(wk%60)+'m';
    document.getElementById('todayPct').textContent=fmt(tp*100)+'%';
    document.getElementById('todayBar').style.width=fmt(tp*100)+'%';
    document.getElementById('todaySub').textContent='距离下班 '+Math.floor(rm/60)+'h '+Math.round(rm%60)+'m + ' +S.workStart+'-'+S.workEnd;
    document.getElementById('monthPct').textContent=fmt(mp*100)+'%';
    document.getElementById('monthBar').style.width=fmt(mp*100)+'%';
    document.getElementById('monthSub').textContent='累计 '+cny(em)+' / '+cny(proj);
    document.getElementById('calDesc').textContent='法定 '+lw+' 天 + 加班 '+ot+' - 请假 '+lv+' = 有效 '+ew+' 天';
  }else{
    document.getElementById('todayEarned').textContent='--';
    document.getElementById('monthEarned').textContent=cny(proj);
    document.getElementById('todayHint').textContent='回顾模式';
    document.getElementById('todayPct').textContent='--';
    document.getElementById('todayBar').style.width='0%';
    document.getElementById('todaySub').textContent=y+'年'+(m+1)+'月 + 回顾模式';
    document.getElementById('monthPct').textContent='100.00%';
    document.getElementById('monthBar').style.width='100%';
    document.getElementById('monthSub').textContent='总计 '+cny(proj);
    document.getElementById('calDesc').textContent='回顾 + 法定 '+lw+' 天 + 加班 '+ot+' - 请假 '+lv+' = 有效 '+ew+' 天';
  }

  document.getElementById('heroWorkdays').textContent=ew;
  document.getElementById('dailySalary').textContent=cny(dp);
  document.getElementById('monthHint').textContent='预计到手 '+cny(proj);
  document.getElementById('dailyHint').textContent='加班 +'+ot+' 天  +  请假 -'+lv+' 天';

  document.getElementById('calMonthLabel').textContent=y+'年'+(m+1)+'月';
  renderCal(y,m,isNow?d:-1);
}

// ====== 日历渲染 ======
function renderCal(y,m,today){
  var grid=document.getElementById('calGrid');
  var ds=new Date(y,m+1,0).getDate();
  var off=(new Date(y,m,1).getDay()+6)%7;
  grid.innerHTML='';
  for(var i=0;i<off;i++){var e=document.createElement('span');e.className='cal-cell';e.style.visibility='hidden';grid.appendChild(e);}
  for(var day=1;day<=ds;day++){
    var cell=document.createElement('span');
    cell.className='cal-cell';

    var wk=isWeekend(y,m,day),hol=isHoliday(y,m,day),ot=isOvertime(y,m,day),lv=isLeave(y,m,day);
    var bg,clr,fw='';
    if(day===today){bg='var(--accent)';clr='#fff';fw='700';}
    else if(ot){bg='#1a6fb5';clr='#fff';fw='600';}
    else if(lv){bg='#fce4c8';clr='#b8731f';fw='600';}
    else if(hol){bg='#fff0ed';clr='#e8603a';}
    else if(wk){bg='transparent';clr='#c5c0b8';}
    else{bg='#f6f3ee';clr='#1a1a1a';}
    cell.style.background=bg;cell.style.color=clr;if(fw)cell.style.fontWeight=fw;

    var ns=document.createElement('span');ns.textContent=day;cell.appendChild(ns);

    var tag='',tbg='';
    if(ot){tag='加';tbg='#1a6fb5';}else if(lv){tag='休';tbg='#cc8635';}
    if(tag){var t=document.createElement('span');t.className='cal-cell-tag';t.textContent=tag;t.style.background=tbg;cell.appendChild(t);}

    (function(dd,isWk,isHol){
      cell.addEventListener('click',function(){
        var k=key(y,m,dd);
        if(isWk||isHol){OT.has(k)?OT.delete(k):OT.add(k);}
        else{LV.has(k)?LV.delete(k):LV.add(k);}
        persist();refresh(y,m,new Date());
      });
    })(day,wk,hol);

    grid.appendChild(cell);
  }
}

// ====== 月份导航 ======
var vy=0,vm=0;

function go(delta){
  vm+=delta;if(vm<0){vm=11;vy--;}if(vm>11){vm=0;vy++;}
  var n=new Date();vy=vy>n.getFullYear()+1?n.getFullYear()+1:vy;vy=vy<2026?2026:vy;
  refresh(vy,vm,n);
}

// ====== 每秒刷新 ======
function tick(){
  var n=new Date(),hh=pad(n.getHours()),mm=pad(n.getMinutes()),ss=pad(n.getSeconds());
  document.getElementById('topTime').textContent=n.getFullYear()+'年'+pad(n.getMonth()+1)+'月'+pad(n.getDate())+'日 '+hh+':'+mm+':'+ss;
  document.getElementById('liveClock').textContent=hh+':'+mm+':'+ss;
  document.getElementById('clockHint').textContent=S.timezone;
  document.getElementById('heroSub').textContent='时区 '+S.timezone+' + '+n.getFullYear()+'/'+pad(n.getMonth()+1)+'/'+pad(n.getDate());
  if(n.getFullYear()===vy&&n.getMonth()===vm)refresh(vy,vm,n);
}

// ====== 响应式 ======
function adapt(){
  var w=window.innerWidth,mc=document.getElementById('mainCol'),sc=document.getElementById('sideCol');
  var cp=document.getElementById('configPanel'),calp=document.getElementById('calendarPanel');
  var dr=document.getElementById('dashboardRoot');
  if(w>=1000){dr.style.gridTemplateColumns='1fr 340px';if(cp.parentNode!==sc)sc.appendChild(cp);if(calp.parentNode!==mc)mc.appendChild(calp);}
  else{dr.style.gridTemplateColumns='1fr';if(cp.parentNode!==mc)mc.appendChild(cp);if(calp.parentNode!==mc)mc.appendChild(calp);}
}

// ====== 启动 ======
(function(){
  adapt();window.addEventListener('resize',adapt);load();
  var n=new Date();vy=n.getFullYear();vm=n.getMonth();
  refresh(vy,vm,n);
  document.getElementById('btnSave').addEventListener('click',function(){persist();refresh(vy,vm,new Date());});
  document.getElementById('calPrev').addEventListener('click',function(){go(-1);});
  document.getElementById('calNext').addEventListener('click',function(){go(1);});
  setInterval(tick,1000);
})();
</script>
</body>
</html>
